name: Backend Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      OPENAI_API_KEY: dummy
      ANTHROPIC_API_KEY: dummy
      SENDGRID_API_KEY: dummy
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/autobot_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend regression suite
        run: npm run test:regression:backend
